<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>1x3 Master Label</title>
    <style>
        @page { size: 3in 1in; margin: 0; }
        body {
            width: 3in; height: 1in; margin: 0; padding: 0;
            font-family: Arial, sans-serif; background-color: white; overflow: hidden;
        }
        .label-page {
            width: 3in; height: 1in; display: flex; box-sizing: border-box; padding: 3px 5px;
        }
        /* LEFT SECTION */
        .left-side {
            width: 42%; border-right: 0.5pt solid black;
            display: flex; flex-direction: column; height: 100%; overflow: hidden;
        }
        .brand-header {
            font-size: 5.5pt; text-transform: uppercase;
            border-bottom: 0.5pt solid black; padding-bottom: 1px;
            margin-bottom: 2px; display: flex; justify-content: space-between;
        }
        .pkg-badge { font-weight: bold; color: black; }

        .sku-container { flex-grow: 1; display: flex; flex-direction: column; }
        .sku-row { display: flex; align-items: flex-start; margin-bottom: 1px; }
        .bullet { font-size: 6pt; margin-right: 3px; line-height: 1.2; }
        .sku-text { font-size: 6pt; line-height: 1.2; word-break: break-all; }

        /* RIGHT SECTION */
        .right-side {
            width: 58%; padding-left: 5px;
            display: flex; flex-direction: column; justify-content: center; height: 100%;
        }
        .item-row { display: flex; align-items: center; margin-bottom: 3px; }
        .qty-frame {
            border: 0.8pt solid black; font-size: 11pt; font-weight: bold;
            width: 15pt; height: 15pt; display: flex; align-items: center;
            justify-content: center; margin-right: 5px; flex-shrink: 0;
        }
        .item-info { display: flex; flex-direction: column; overflow: hidden; }
        .code-text { font-size: 7.5pt; font-weight: bold; white-space: nowrap; }
        .desc-text { 
            font-size: 5.5pt; white-space: nowrap; overflow: hidden; 
            text-overflow: ellipsis; color: #333; 
        }
    </style>
</head>
<body>
    <div id="label-content" class="label-page">
        <div class="left-side">
            <div class="brand-header">
                <span id="brandHeader">LOADING...</span>
                <span id="pkgId" class="pkg-badge"></span>
            </div>
            <div id="skuList" class="sku-container"></div>
        </div>
        <div id="itemsList" class="right-side"></div>
    </div>

    <script>
        window.onload = function() {
            try {
                const params = new URLSearchParams(window.location.search);
                
                // 1. Brand & Package ID
                document.getElementById('brandHeader').textContent = params.get('brand') || 'NEXT AI';
                document.getElementById('pkgId').textContent = 'PKG: ' + (params.get('pkg') || '?');

                // 2. SKUs
                const skus = (params.get('sku') || '').split(',').filter(x => x);
                document.getElementById('skuList').innerHTML = skus.map(s => `
                    <div class="sku-row"><span class="bullet">•</span><span class="sku-text">${s.trim()}</span></div>
                `).join('');

                // 3. Items (Code, Desc, Qty)
                const codes = (params.get('code') || '').split(',').filter(x => x);
                const descs = (params.get('desc') || '').split('|').filter(x => x); // Using | delimiter for descs
                const qtys = (params.get('qty') || '').split(',').filter(x => x);
                const itemsContainer = document.getElementById('itemsList');

                codes.forEach((code, i) => {
                    if (i < 4) { 
                        const row = document.createElement('div');
                        row.className = 'item-row';
                        row.innerHTML = `
                            <div class="qty-frame">${qtys[i] || 0}</div>
                            <div class="item-info">
                                <span class="code-text">${code.trim()}</span>
                                <span class="desc-text">${descs[i] || ''}</span>
                            </div>
                        `;
                        itemsContainer.appendChild(row);
                    }
                });

                if (params.get('print') === 'true') { setTimeout(() => { window.print(); }, 700); }
            } catch (err) { console.error(err); }
        };
    </script>
</body>
</html>
