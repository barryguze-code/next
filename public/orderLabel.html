<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>2.8x1 Thermal Master Label</title>
    <style>
        /* PRINT CONFIGURATION */
        @page { size: 2.8in 1in; margin: 0; }
        
        /* BASE STYLES */
        body { 
            margin: 0; padding: 0; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #f0f2f5; color: black; width: 100%;
        }

        /* PROFESSIONAL TOOLBAR */
        .toolbar { 
            display: flex; flex-direction: row; justify-content: center; align-items: center;
            gap: 20px; padding: 12px; background: #2c3e50; color: white; 
            position: sticky; top: 0; z-index: 1000; width: 100%; box-sizing: border-box;
            border-bottom: 2px solid #1a252f;
        }
        .toolbar-row { display: flex; gap: 10px; align-items: center; }
        
        .btn { 
            padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; 
            font-weight: bold; font-size: 13px; text-decoration: none; display: inline-flex; 
            align-items: center; transition: background 0.2s;
        }
        .btn-print { background: #3498db; color: white; }
        .btn-amazon { background: #ff9900; color: white; }
        .btn-log { background: #27ae60; color: white; }
        
        #logSuccess { color: #2ecc71; font-weight: bold; font-size: 18px; margin-left: 5px; opacity: 0; transition: opacity 0.3s; }
        .employee-select { padding: 6px; border-radius: 4px; font-size: 13px; height: 34px; border: 1px solid #ddd; min-width: 150px; }

        /* SCREEN PREVIEW LOGIC */
        @media screen {
            #labels-container {
                display: flex; flex-direction: column; align-items: center;
                padding: 40px 0; gap: 25px; zoom: 2.0; 
            }
            .label-page {
                background: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1);
                border: 1px solid #ccc; margin-bottom: 10px;
            }
        }

        /* PRINT SETTINGS */
        @media print { 
            .toolbar { display: none !important; } 
            body { background: white; width: 2.8in; }
            #labels-container { zoom: 1.0 !important; padding: 0; gap: 0; }
            .label-page { border: none; box-shadow: none; margin: 0; }
        }

        /* THERMAL LABEL DESIGN (FIXED AT 2.8x1) */
        .label-page {
            width: 2.8in; height: 1in; box-sizing: border-box;
            padding: 2px 6px; page-break-after: always;
            display: flex; flex-direction: column; position: relative; overflow: hidden;
        }
        .header-section { 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1.5pt solid black; margin-bottom: 2px; height: 14pt; 
        }
        .brand-text { font-size: 7pt; font-weight: 900; text-transform: uppercase; }
        .order-id-text { font-size: 6pt; flex-grow: 1; text-align: center; font-weight: bold; }
        .pkg-badge { font-size: 7pt; font-weight: 900; }

        .line-item { display: flex; align-items: flex-start; margin-bottom: 1px; height: 22pt; overflow: hidden; }
        .qty-frame { 
            border: 1.5pt solid black; font-size: 11pt; font-weight: 900; 
            min-width: 18pt; height: 15pt; display: flex; align-items: center; 
            justify-content: center; margin-right: 5px; margin-top: 1px;
        }
        
        .text-content { display: flex; flex-direction: column; width: 100%; line-height: 1.0; }
        .item-main-row { display: flex; align-items: center; gap: 3px; white-space: nowrap; }
        .code-text { font-size: 9pt; font-weight: 900; }
        
        .exp-container { font-size: 6.5pt; font-weight: bold; }
        .loc-frame { border: 1.2pt solid black; padding: 0 3px; font-size: 7pt; font-weight: 900; }

        .item-desc { font-size: 6pt; font-weight: normal; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sku-row { font-size: 6.5pt; font-weight: bold; border-bottom: 0.5pt solid #eee; margin-bottom: 1px; white-space: nowrap; overflow: hidden; }
        .by-display { position: absolute; bottom: 1px; right: 6px; font-size: 6pt; font-weight: 900; }
    </style>
</head>
<body>

    <div class="toolbar">
        <div class="toolbar-row">
            <button class="btn btn-print" onclick="window.print()">Print Label</button>
            <a id="amazonBtn" class="btn btn-amazon" target="_blank">Amazon Order</a>
        </div>
        <div class="toolbar-row">
            <select id="employeeSelect" class="employee-select"><option value="">Select Name</option></select>
            <button class="btn btn-log" id="logOrderBtn">Log Order</button>
            <span id="logSuccess">✓</span>
        </div>
    </div>

    <div id="labels-container"></div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbzmvGwfCjzCO_9QacTRiszd6biQ79XLuVYJU_7Vs-D-5-FP9oAG7Z4y0iliJ4w7FRxH/exec";
        const params = new URLSearchParams(window.location.search);

        function formatExpDate(dateStr) {
            if (!dateStr) return '';
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            const parts = dateStr.split('-');
            if (parts.length !== 3) return dateStr;
            const year = parts[0].slice(-2);
            const monthNum = parts[1];
            const monthIdx = parseInt(monthNum, 10) - 1;
            const monthName = months[monthIdx] || monthNum;
            return `${monthName}-${monthNum}/${parts[2]}/${year}`;
        }

        window.onload = function() {
            const names = ["Sevinc", "Rudy", "Anthony", "Joshua", "Matilda"];
            const s = document.getElementById('employeeSelect');
            s.innerHTML = '<option value="">Select Name</option>';
            names.forEach(n => {
                let o = document.createElement('option'); o.value = n; o.innerText = n;
                s.appendChild(o);
            });

            s.onchange = (e) => {
                document.querySelectorAll('.by-display').forEach(el => 
                    el.innerText = e.target.value ? `by: ${e.target.value}` : ''
                );
                document.getElementById('logSuccess').style.opacity = "0";
            };

            document.getElementById('logOrderBtn').onclick = () => {
                const orderId = params.get('order_id') || '';
                const emp = s.value;
                if (!emp) return alert("Please select a name first");
                fetch(`${scriptURL}?orderId=${encodeURIComponent(orderId)}&initials=${encodeURIComponent(emp)}`, { mode: 'no-cors' });
                document.getElementById('logSuccess').style.opacity = "1";
            };

            try {
                const orderId = params.get('order_id') || '';
                const skus = (params.get('sku') || '').split(',').filter(x => x);
                const codes = (params.get('code') || '').split(',').filter(x => x);
                const descs = (params.get('desc') || '').split('|');
                const qtys = (params.get('qty') || '').split(',');
                const exps = (params.get('exp') || '').split(',');
                const locs = (params.get('loc') || '').split(',');
                const brand = params.get('brand') || 'BRAND';
                const pkg = params.get('pkg') || '';

                if(orderId) document.getElementById('amazonBtn').href = `https://sellercentral.amazon.com/orders-v3/order/${orderId}`;

                const container = document.getElementById('labels-container');
                
                // Combine all SKUs and Items into a single flat list of "lines"
                let allLines = [];
                skus.forEach(sk => allLines.push({ type: 'sku', val: sk }));
                codes.forEach((c, i) => {
                    if(c) allLines.push({ 
                        type: 'item', code: c, qty: qtys[i] || '0', 
                        desc: descs[i] || '', exp: formatExpDate(exps[i]), loc: locs[i] || '' 
                    });
                });

                // Loop through lines in chunks of 3
                for (let i = 0; i < allLines.length; i += 3) {
                    const page = document.createElement('div');
                    page.className = 'label-page';
                    
                    // Add Header to every page
                    page.innerHTML = `
                        <div class="header-section">
                            <span class="brand-text">${brand}</span>
                            <span class="order-id-text">${orderId}</span>
                            <span class="pkg-badge">${pkg}</span>
                        </div>
                    `;

                    // Add up to 3 lines to this page
                    allLines.slice(i, i + 3).forEach(line => {
                        const row = document.createElement('div');
                        if (line.type === 'sku') {
                            row.className = 'sku-row';
                            row.innerText = `SKU: ${line.val}`;
                        } else {
                            row.className = 'line-item';
                            row.innerHTML = `
                                <div class="qty-frame">${line.qty}</div>
                                <div class="text-content">
                                    <div class="item-main-row">
                                        <span class="code-text">${line.code}</span>
                                        <span class="exp-container">⬤ ${line.exp} ⬤</span>
                                        <div class="loc-frame">${line.loc}</div>
                                    </div>
                                    <div class="item-desc">${line.desc}</div>
                                </div>
                            `;
                        }
                        page.appendChild(row);
                    });

                    const by = document.createElement('div'); 
                    by.className = 'by-display';
                    page.appendChild(by);
                    container.appendChild(page);
                }
            } catch (e) { console.error(e); }
        };
    </script>
</body>
</html>
