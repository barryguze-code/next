<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>1x3 Master Label</title>
    <style>
        @page { size: 3in 1in; margin: 0; }
        body {
            width: 3in;
            height: 1in;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: white;
            overflow: hidden;
        }

        .label-page {
            width: 3in;
            height: 1in;
            display: flex;
            box-sizing: border-box;
            padding: 3px 5px;
        }

        /* LEFT SECTION - Narrower for SKUs */
        .left-side {
            width: 42%; 
            border-right: 0.5pt solid black;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .brand-header {
            font-size: 5.5pt;
            text-transform: uppercase;
            border-bottom: 0.5pt solid black;
            padding-bottom: 1px;
            margin-bottom: 2px;
            white-space: nowrap;
        }

        .sku-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .sku-row {
            display: flex;
            align-items: flex-start;
            margin-bottom: 1px;
        }

        .bullet {
            font-size: 6pt;
            margin-right: 3px;
            line-height: 1.2;
        }

        .sku-text {
            font-size: 6pt;
            line-height: 1.2;
            word-break: break-all;
            font-weight: normal;
        }

        /* RIGHT SECTION - More space for Item Codes */
        .right-side {
            width: 58%;
            padding-left: 5px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
        }

        .item-row {
            display: flex;
            align-items: center;
            margin-bottom: 2px;
        }

        .qty-frame {
            border: 0.8pt solid black;
            font-size: 11pt;
            font-weight: bold; /* Only Quantities are Bold */
            width: 15pt;
            height: 15pt;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 5px;
            flex-shrink: 0;
        }

        .code-text {
            font-size: 8.5pt;
            font-weight: normal; /* Normal as requested */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>
    <div id="label-content" class="label-page">
        <div class="left-side">
            <div id="brandHeader" class="brand-header">LOADING...</div>
            <div id="skuList" class="sku-container"></div>
        </div>
        <div id="itemsList" class="right-side"></div>
    </div>

    <script>
        window.onload = function() {
            try {
                const params = new URLSearchParams(window.location.search);
                
                // 1. Process Brand (Extract name if it's a URL)
                let brand = params.get('brand') || 'NEXT AI';
                if (brand.includes('://')) {
                    brand = brand.split('//')[1].split('.')[0].toUpperCase();
                }
                document.getElementById('brandHeader').textContent = brand;

                // 2. Process SKUs
                const skus = (params.get('sku') || '').split(',').filter(x => x);
                const skuContainer = document.getElementById('skuList');
                skuContainer.innerHTML = skus.map(s => `
                    <div class="sku-row">
                        <span class="bullet">•</span>
                        <span class="sku-text">${s.trim()}</span>
                    </div>
                `).join('');

                // 3. Process Items (Code & Qty)
                const codes = (params.get('code') || '').split(',').filter(x => x);
                const qtys = (params.get('qty') || '').split(',').filter(x => x);
                const itemsContainer = document.getElementById('itemsList');

                codes.forEach((code, i) => {
                    if (i < 5) { 
                        const row = document.createElement('div');
                        row.className = 'item-row';
                        row.innerHTML = `
                            <div class="qty-frame">${qtys[i] || 0}</div>
                            <span class="code-text">${code.trim()}</span>
                        `;
                        itemsContainer.appendChild(row);
                    }
                });

                // Auto-print check
                if (params.get('print') === 'true') {
                    setTimeout(() => { window.print(); }, 500);
                }
            } catch (err) {
                console.error("Layout Error:", err);
            }
        };
    </script>
</body>
</html>
