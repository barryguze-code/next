<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>2.8x1 Master Label</title>
    <style>
        /* Updated page size to 2.8in */
        @page { size: 2.8in 1in; margin: 0; }
        
        body {
            width: 2.8in; margin: 0; padding: 0;
            font-family: Arial, sans-serif; background-color: white;
        }

        /* Toolbar - Hidden during print */
        .toolbar {
            display: flex; gap: 10px; padding: 15px;
            background: #2c3e50; border-bottom: 2px solid #1a252f;
            position: relative; z-index: 9999;
            width: auto; /* Allow toolbar to be wider than label on screen */
        }
        .btn {
            padding: 10px 20px; border: none; border-radius: 4px;
            cursor: pointer; font-weight: bold; text-decoration: none;
            font-size: 13px; display: inline-flex; align-items: center;
        }
        .btn-print { background: #3498db; color: white; }
        .btn-amazon { background: #ff9900; color: white; }

        @media print {
            .toolbar { display: none !important; position: absolute !important; height: 0; }
            body { margin: 0; padding: 0; }
        }

        /* Adjusted Label Page Width */
        .label-page {
            width: 2.8in; height: 1in;
            box-sizing: border-box;
            padding: 2px 8px;
            page-break-after: always;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header-section {
            display: flex; 
            justify-content: space-between; 
            align-items: baseline;
            border-bottom: 1.5pt solid black; 
            padding-bottom: 1px; 
            margin-bottom: 3px;
        }
        .brand-text { font-size: 9pt; font-weight: bold; text-transform: uppercase; }
        .order-id-text { font-size: 7pt; font-weight: normal; color: #333; flex-grow: 1; text-align: center; }
        .pkg-badge { font-size: 9pt; font-weight: bold; text-align: right; }

        .line-item {
            display: flex; align-items: center;
            margin-bottom: 2px; height: 16pt;
        }

        .qty-frame {
            border: 1.2pt solid black;
            font-size: 13pt; font-weight: 900;
            min-width: 22pt; height: 15pt;
            display: flex; align-items: center; justify-content: center;
            margin-right: 6px; flex-shrink: 0;
        }

        .bullet { margin-right: 6px; font-weight: bold; font-size: 10pt; }
        
        .text-content {
            display: flex; flex-direction: column;
            line-height: 1; overflow: hidden;
        }
        .item-code { font-size: 8.5pt; font-weight: bold; }
        .item-desc { font-size: 6.5pt; font-weight: normal; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
        .sku-label { font-size: 7.5pt; font-weight: normal; }

        .separator {
            border-top: 1pt solid black;
            margin: 2px 0; width: 100%;
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <button class="btn btn-print" id="printBtn">⌘ + ⌥ + P</button>
        <a id="amazonBtn" class="btn btn-amazon" target="_blank">Buy Label</a>
    </div>

    <div id="labels-container"></div>

    <script>
        window.onload = function() {
            try {
                const params = new URLSearchParams(window.location.search);
                const orderId = params.get('order_id') || '';
                const skus = (params.get('sku') || '').split(',').filter(x => x);
                const codes = (params.get('code') || '').split(',').filter(x => x);
                const descs = (params.get('desc') || '').split('|').filter(x => x);
                const qtys = (params.get('qty') || '').split(',').filter(x => x);
                const brand = params.get('brand') || 'NEXT AI';
                const pkg = params.get('pkg') || '?';

                if (orderId) {
                    document.getElementById('amazonBtn').href = `https://sellercentral.amazon.com/orders-v3/order/${orderId}`;
                } else {
                    document.getElementById('amazonBtn').style.display = 'none';
                }

                // Manual print trigger only
                document.getElementById('printBtn').addEventListener('click', () => {
                    alert("To print the label correctly, please press Command (⌘) + Option (⌥) + P");
                });

                let rows = [];
                skus.forEach(s => rows.push({ type: 'sku', text: s }));
                rows.push({ type: 'sep' });
                codes.forEach((c, i) => {
                    rows.push({ type: 'item', code: c, qty: qtys[i] || 0, desc: descs[i] || '' });
                });

                const LIMIT = 4; 
                const container = document.getElementById('labels-container');
                
                for (let i = 0; i < rows.length; i += LIMIT) {
                    const chunk = rows.slice(i, i + LIMIT);
                    const page = document.createElement('div');
                    page.className = 'label-page';

                    if (i === 0) {
                        page.innerHTML = `
                        <div class="header-section">
                            <span class="brand-text">${brand}</span>
                            <span class="order-id-text">${orderId}</span>
                            <span class="pkg-badge">${pkg}</span>
                        </div>`;
                    }

                    chunk.forEach(row => {
                        const el = document.createElement('div');
                        if (row.type === 'sku') {
                            el.className = 'line-item';
                            el.innerHTML = `<span class="bullet">•</span><span class="sku-label">${row.text}</span>`;
                        } else if (row.type === 'item') {
                            el.className = 'line-item';
                            el.innerHTML = `<div class="qty-frame">${row.qty}</div>
                                <div class="text-content">
                                    <span class="item-code">${row.code}</span>
                                    <span class="item-desc">${row.desc}</span>
                                </div>`;
                        } else if (row.type === 'sep') {
                            el.className = 'separator';
                        }
                        page.appendChild(el);
                    });
                    container.appendChild(page);
                }
            } catch (e) { console.error(e); }
        };
    </script>
</body>
</html>
