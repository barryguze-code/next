<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>1x3 Master Label</title>
    <style>
        @page { size: 3in 1in; margin: 0; }
        body {
            width: 3in; margin: 0; padding: 0;
            font-family: Arial, sans-serif; background-color: white;
        }
        .label-page {
            width: 3in; height: 1in;
            box-sizing: border-box;
            padding: 4px 8px;
            page-break-after: always;
            display: flex;
            flex-direction: column;
        }
        /* Header Styling */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1.5pt solid black;
            padding-bottom: 2px;
            margin-bottom: 4px;
        }
        .brand-text {
            font-size: 10pt;
            font-weight: bold;
            text-transform: uppercase;
        }
        .pkg-badge {
            font-size: 9pt;
            font-weight: bold;
        }

        /* List Styling */
        .line-item {
            display: flex;
            align-items: center;
            font-size: 8pt;
            line-height: 1.2;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
        }
        .bullet { margin-right: 5px; font-weight: bold; }
        .qty-bold { font-weight: bold; margin-right: 5px; font-size: 9pt; }
        .desc-text { font-weight: normal; text-transform: none; } /* Mixed case as requested */
        
        .separator {
            border-top: 0.5pt solid #444;
            margin: 3px 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="labels-container"></div>

    <script>
        window.onload = function() {
            try {
                const params = new URLSearchParams(window.location.search);
                const skus = (params.get('sku') || '').split(',').filter(x => x);
                const codes = (params.get('code') || '').split(',').filter(x => x);
                const descs = (params.get('desc') || '').split('|').filter(x => x);
                const qtys = (params.get('qty') || '').split(',').filter(x => x);
                const brand = params.get('brand') || 'NEXT AI';
                const pkg = params.get('pkg') || '?';

                // Combine all data into one master list of rows to print
                let allRows = [];
                skus.forEach(s => allRows.push({ type: 'sku', text: s }));
                allRows.push({ type: 'sep' });
                codes.forEach((c, i) => {
                    allRows.push({ type: 'item', code: c, qty: qtys[i] || 0, desc: descs[i] || '' });
                });

                const ROWS_PER_PAGE = 5;
                const container = document.getElementById('labels-container');
                
                for (let i = 0; i < allRows.length; i += ROWS_PER_PAGE) {
                    const pageRows = allRows.slice(i, i + ROWS_PER_PAGE);
                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'label-page';

                    // Only Add Header to Page 1
                    if (i === 0) {
                        pageDiv.innerHTML = `
                            <div class="header-section">
                                <span class="brand-text">${brand}</span>
                                <span class="pkg-badge">PKG: ${pkg}</span>
                            </div>
                        `;
                    }

                    pageRows.forEach(row => {
                        const rowDiv = document.createElement('div');
                        if (row.type === 'sku') {
                            rowDiv.className = 'line-item';
                            rowDiv.innerHTML = `<span class="bullet">•</span><span class="desc-text">${row.text}</span>`;
                        } else if (row.type === 'item') {
                            rowDiv.className = 'line-item';
                            rowDiv.innerHTML = `<span class="qty-bold">${row.qty}</span> <span class="desc-text"><b>${row.code}</b> - ${row.desc}</span>`;
                        } else if (row.type === 'sep') {
                            rowDiv.className = 'separator';
                        }
                        pageDiv.appendChild(rowDiv);
                    });

                    container.appendChild(pageDiv);
                }

                if (params.get('print') === 'true') {
                    setTimeout(() => { window.print(); }, 700);
                }
            } catch (err) { console.error(err); }
        };
    </script>
</body>
</html>
