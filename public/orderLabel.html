<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Order Label</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      box-sizing: border-box;
      padding: 20px;
      page-break-after: always;
    }

    .page:last-child {
      page-break-after: auto;
    }

    .header {
      margin-bottom: 20px;
    }

    .header h2 {
      margin: 0 0 8px 0;
      font-size: 20px;
    }

    .header p {
      margin: 4px 0;
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #000;
      padding: 8px;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: #f2f2f2;
    }

    @media print {
      .page {
        page-break-after: always;
      }

      .page:last-child {
        page-break-after: auto;
      }
    }
  </style>
</head>
<body>
  <div id="printArea"></div>

  <script>
    function getParam(name) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(name) || "";
    }

    function chunkArray(arr, size) {
      const result = [];
      for (let i = 0; i < arr.length; i += size) {
        result.push(arr.slice(i, i + size));
      }
      return result;
    }

    const brand = getParam("brand");
    const orderId = getParam("order_id");
    const codeList = getParam("code").split(",").filter(Boolean);
    const qtyList = getParam("qty").split(",").filter(Boolean);
    const descList = getParam("desc").split("|").filter(Boolean);

    const items = [];
    const maxLen = Math.max(codeList.length, qtyList.length, descList.length);

    for (let i = 0; i < maxLen; i++) {
      items.push({
        code: codeList[i] || "",
        qty: qtyList[i] || "",
        desc: descList[i] || ""
      });
    }

    const pages = chunkArray(items, 3);
    const printArea = document.getElementById("printArea");

    pages.forEach((pageItems, pageIndex) => {
      const page = document.createElement("div");
      page.className = "page";

      let rows = "";
      pageItems.forEach(item => {
        rows += `
          <tr>
            <td>${item.code}</td>
            <td>${item.qty}</td>
            <td>${item.desc}</td>
          </tr>
        `;
      });

      page.innerHTML = `
        <div class="header">
          <h2>${brand}</h2>
          <p><strong>Order ID:</strong> ${orderId}</p>
          <p><strong>Page:</strong> ${pageIndex + 1} / ${pages.length}</p>
        </div>

        <table>
          <thead>
            <tr>
              <th>Item Code</th>
              <th>Qty</th>
              <th>Description</th>
            </tr>
          </thead>
          <tbody>
            ${rows}
          </tbody>
        </table>
      `;

      printArea.appendChild(page);
    });

    // Optional auto print
    // window.print();
  </script>
</body>
</html>
