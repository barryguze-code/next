<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>1x3 Master Label</title>
    <style>
        @page { size: 3in 1in; margin: 0; }
        body {
            width: 3in; margin: 0; padding: 0;
            font-family: Arial, sans-serif; background-color: white;
        }

        /* Toolbar for Buttons - Hidden during print */
        .toolbar {
            display: flex;
            gap: 10px;
            padding: 10px;
            background: #f4f4f4;
            border-bottom: 1px solid #ddd;
        }
        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            font-size: 12px;
        }
        .btn-print { background: #2196F3; color: white; }
        .btn-amazon { background: #ff9900; color: black; }

        @media print {
            .toolbar { display: none ! festivals; }
        }

        /* Label Layout */
        .label-page {
            width: 3in; height: 1in;
            box-sizing: border-box;
            padding: 4px 10px;
            page-break-after: always;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header Section */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2pt solid black;
            padding-bottom: 2px;
            margin-bottom: 5px;
        }
        .brand-text { font-size: 11pt; font-weight: bold; text-transform: uppercase; }
        .pkg-badge { font-size: 10pt; font-weight: bold; }

        /* List Rows */
        .line-item {
            display: flex;
            align-items: center;
            margin-bottom: 4px;
            white-space: nowrap;
        }

        /* RECTANGLE QTY FRAME */
        .qty-frame {
            border: 1.5pt solid black;
            font-size: 14pt;
            font-weight: 900;
            min-width: 22pt;
            height: 18pt;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 8px;
            flex-shrink: 0;
        }

        .bullet { margin-right: 8px; font-weight: bold; font-size: 10pt; }
        
        .text-content {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
            overflow: hidden;
        }
        .item-code { font-size: 9pt; font-weight: bold; }
        .item-desc { font-size: 7pt; font-weight: normal; text-transform: none; text-overflow: ellipsis; overflow: hidden; }
        .sku-label { font-size: 8pt; font-weight: normal; }

        .separator {
            border-top: 1.5pt solid black;
            margin: 2px 0;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <button class="btn btn-print" onclick="window.print()">Print Label</button>
        <a id="amazonBtn" class="btn btn-amazon" target="_blank">Go to Amazon Order</a>
    </div>

    <div id="labels-container"></div>

    <script>
        window.onload = function() {
            try {
                const params = new URLSearchParams(window.location.search);
                const orderId = params.get('order_id') || '';
                const skus = (params.get('sku') || '').split(',').filter(x => x);
                const codes = (params.get('code') || '').split(',').filter(x => x);
                const descs = (params.get('desc') || '').split('|').filter(x => x);
                const qtys = (params.get('qty') || '').split(',').filter(x => x);
                const brand = params.get('brand') || 'NEXT AI';
                const pkg = params.get('pkg') || '?';

                // Set Amazon Link
                if (orderId) {
                    document.getElementById('amazonBtn').href = `https://sellercentral.amazon.com/orders-v3/order/${orderId}`;
                } else {
                    document.getElementById('amazonBtn').style.display = 'none';
                }

                // Build Item List
                let allRows = [];
                skus.forEach(s => allRows.push({ type: 'sku', text: s }));
                allRows.push({ type: 'sep' });
                codes.forEach((c, i) => {
                    allRows.push({ type: 'item', code: c, qty: qtys[i] || 0, desc: descs[i] || '' });
                });

                const ROWS_PER_PAGE = 5;
                const container = document.getElementById('labels-container');
                
                for (let i = 0; i < allRows.length; i += ROWS_PER_PAGE) {
                    const pageRows = allRows.slice(i, i + ROWS_PER_PAGE);
                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'label-page';

                    // Header only on page 1
                    if (i === 0) {
                        pageDiv.innerHTML = `
                            <div class="header-section">
                                <span class="brand-text">${brand}</span>
                                <span class="pkg-badge">PKG: ${pkg}</span>
                            </div>`;
                    }

                    pageRows.forEach(row => {
                        const div = document.createElement('div');
                        if (row.type === 'sku') {
                            div.className = 'line-item';
                            div.innerHTML = `<span class="bullet">•</span><span class="sku-label">${row.text}</span>`;
                        } else if (row.type === 'item') {
                            div.className = 'line-item';
                            div.innerHTML = `
                                <div class="qty-frame">${row.qty}</div>
                                <div class="text-content">
                                    <span class="item-code">${row.code}</span>
                                    <span class="item-desc">${row.desc}</span>
                                </div>`;
                        } else if (row.type === 'sep') {
                            div.className = 'separator';
                        }
                        pageDiv.appendChild(div);
                    });
                    container.appendChild(pageDiv);
                }

                // Automatic Print Trigger
                setTimeout(() => { window.print(); }, 1000);
                
            } catch (err) { console.error("Initialization Error:", err); }
        };
    </script>
</body>
</html>
