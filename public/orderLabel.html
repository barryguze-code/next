<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Labels</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f4f4f4; }
        .toolbar { 
            display: flex; gap: 10px; align-items: center; background: white; 
            padding: 10px; border-radius: 8px; margin-bottom: 15px; position: sticky; top: 10px; z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        select, button { padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 14px; }
        button { cursor: pointer; background: #007bff; color: white; border: none; font-weight: bold; }
        button:hover { background: #0056b3; }
        #amazonBtn { background: #ff9900; color: #111; text-decoration: none; padding: 8px 12px; border-radius: 4px; font-size: 14px; font-weight: bold; }
        #logSuccess { color: green; font-weight: bold; opacity: 0; transition: opacity 0.3s; }
        
        .label-page { 
            width: 4in; height: 6in; background: white; margin: 0 auto 20px auto; 
            padding: 0.1in; box-sizing: border-box; border: 1px solid #eee;
            display: flex; flex-direction: column; page-break-after: always;
        }
        .header-section { border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .brand-text { font-size: 18pt; font-weight: bold; }
        .order-id-text { font-size: 10pt; color: #555; }
        .pkg-badge { background: #000; color: #fff; padding: 2px 6px; border-radius: 3px; font-weight: bold; }
        
        .row { border: 1px solid #000; margin-bottom: 5px; padding: 5px; display: flex; flex-direction: column; position: relative; flex: 1; }
        .sku-row { background: #f9f9f9; justify-content: center; align-items: center; }
        .sku-val { font-size: 24pt; font-weight: bold; }
        
        .item-main { display: flex; justify-content: space-between; align-items: flex-start; }
        .item-code { font-size: 22pt; font-weight: bold; }
        .item-qty { font-size: 20pt; font-weight: bold; border: 2px solid #000; padding: 2px 8px; }
        .item-desc { font-size: 10pt; margin: 3px 0; font-weight: 500; }
        .item-footer { display: flex; justify-content: space-between; align-items: flex-end; margin-top: auto; }
        .item-exp { font-size: 11pt; font-weight: bold; }
        .item-loc { font-size: 14pt; font-weight: bold; background: #eee; padding: 2px 5px; }
        .by-display { position: absolute; top: 2px; right: 5px; font-size: 8pt; font-style: italic; color: #666; }

        @media print {
            body { background: none; padding: 0; }
            .toolbar { display: none; }
            .label-page { margin: 0; border: none; }
        }
    </style>
</head>
<body>

<div class="toolbar">
    <select id="employeeSelect"><option value="">Loading...</option></select>
    <button id="logOrderBtn">Log Order</button>
    <span id="logSuccess">✓ Logged</span>
    <div style="flex-grow: 1;"></div>
    <a id="amazonBtn" target="_blank">Amazon Order</a>
    <button onclick="window.print()">Print Labels</button>
</div>

<div id="labels-container"></div>

<script>
    const params = new URLSearchParams(window.location.search);
    const scriptURL = "https://script.google.com/macros/s/AKfycby-your-script-id/exec"; // Replace with your actual Apps Script URL

    function formatExpDate(dateStr) {
        if (!dateStr) return '';
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        const parts = dateStr.split('-');
        if (parts.length !== 3) return dateStr;
        const year = parts[0].slice(-2);
        const monthIdx = parseInt(parts[1], 10) - 1;
        const monthName = months[monthIdx] || parts[1];
        return `${monthName}-${parts[1]}/${parts[2]}/${year}`;
    }

    window.onload = function() {
        const s = document.getElementById('employeeSelect');
        const names = ["Sevinc", "Rudy", "Anthony", "Joshua", "Matilda"];
        
        // 1. Populate Names Instantly
        s.innerHTML = '<option value="">Select Name</option>';
        names.forEach(n => {
            let o = document.createElement('option');
            o.value = n; o.innerText = n;
            s.appendChild(o);
        });

        // 2. Handle Name Change (Visual update)
        s.onchange = (e) => {
            document.querySelectorAll('.by-display').forEach(el => 
                el.innerText = e.target.value ? `by: ${e.target.value}` : ''
            );
            document.getElementById('logSuccess').style.opacity = "0";
        };

        // 3. Log Order Button Logic
        document.getElementById('logOrderBtn').onclick = function() {
            const emp = s.value;
            const orderId = params.get('order_id') || '';
            if (!emp) return alert("Please select a name first");
            
            fetch(`${scriptURL}?orderId=${encodeURIComponent(orderId)}&initials=${encodeURIComponent(emp)}`, { mode: 'no-cors' });
            document.getElementById('logSuccess').style.opacity = "1";
        };

        // 4. Build Labels
        try {
            const orderId = params.get('order_id') || '';
            const skus = (params.get('sku') || '').split(',').filter(x => x);
            const codes = (params.get('code') || '').split(',').filter(x => x);
            const descs = (params.get('desc') || '').split('|');
            const qtys = (params.get('qty') || '').split(',');
            const exps = (params.get('exp') || '').split(',');
            const locs = (params.get('loc') || '').split(',');
            const brand = params.get('brand') || 'BRAND';
            const pkg = params.get('pkg') || '';

            if(orderId) document.getElementById('amazonBtn').href = `https://sellercentral.amazon.com/orders-v3/order/${orderId}`;

            const container = document.getElementById('labels-container');
            let allRows = [];
            
            skus.forEach(sk => allRows.push({ type: 'sku', val: sk }));
            codes.forEach((c, i) => {
                if(c) allRows.push({ 
                    type: 'item', code: c, qty: qtys[i] || '0', 
                    desc: descs[i] || '', exp: formatExpDate(exps[i]), loc: locs[i] || '' 
                });
            });

            for (let i = 0; i < allRows.length; i += 4) {
                const page = document.createElement('div');
                page.className = 'label-page';
                if (i === 0) {
                    page.innerHTML = `<div class="header-section"><span class="brand-text">${brand}</span><span class="order-id-text">${orderId}</span><span class="pkg-badge">${pkg}</span></div>`;
                }
                
                allRows.slice(i, i + 4).forEach(row => {
                    const rowDiv = document.createElement('div');
                    if (row.type === 'sku') {
                        rowDiv.className = 'row sku-row';
                        rowDiv.innerHTML = `<span class="sku-val">${row.val}</span>`;
                    } else {
                        rowDiv.className = 'row';
                        rowDiv.innerHTML = `
                            <div class="by-display"></div>
                            <div class="item-main">
                                <span class="item-code">${row.code}</span>
                                <span class="item-qty">${row.qty}</span>
                            </div>
                            <div class="item-desc">${row.desc}</div>
                            <div class="item-footer">
                                <span class="item-exp">${row.exp}</span>
                                <span class="item-loc">${row.loc}</span>
                            </div>`;
                    }
                    page.appendChild(rowDiv);
                });
                container.appendChild(page);
            }
        } catch (e) {
            console.error("Error generating labels:", e);
        }
    };
</script>

</body>
</html>
