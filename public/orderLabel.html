<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>1x3 Master Label</title>
    <style>
        /* Print Settings */
        @page { 
            size: 3in 1in; 
            margin: 0; 
        }
        
        body {
            width: 3in; 
            margin: 0; 
            padding: 0;
            font-family: Arial, sans-serif; 
            background-color: white;
        }

        /* TOOLBAR - Visible on screen, removed from print flow */
        .toolbar {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: #2c3e50;
            border-bottom: 2px solid #1a252f;
            position: relative;
            z-index: 9999;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
        }
        .btn-print { background: #3498db; color: white; }
        .btn-amazon { background: #ff9900; color: white; }

        /* CRITICAL: Fix for the blank first page */
        @media print {
            .toolbar { 
                display: none !important; 
                position: absolute !important;
                height: 0 !important;
                width: 0 !important;
                overflow: hidden !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            body { margin: 0; padding: 0; }
        }

        /* Label Container */
        .label-page {
            width: 3in; 
            height: 1in;
            box-sizing: border-box;
            padding: 4px 10px;
            page-break-after: always;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header Layout */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2pt solid black;
            padding-bottom: 2px;
            margin-bottom: 5px;
        }
        .brand-text { font-size: 11pt; font-weight: bold; text-transform: uppercase; }
        .pkg-badge { font-size: 10pt; font-weight: bold; }

        /* Rows */
        .line-item {
            display: flex;
            align-items: center;
            margin-bottom: 4px;
            white-space: nowrap;
        }

        /* MEGA RECTANGLE QTY */
        .qty-frame {
            border: 1.5pt solid black;
            font-size: 14pt;
            font-weight: 900;
            min-width: 22pt;
            height: 18pt;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 8px;
            flex-shrink: 0;
        }

        .bullet { margin-right: 8px; font-weight: bold; font-size: 10pt; }
        
        .text-content {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
            overflow: hidden;
        }
        .item-code { font-size: 9pt; font-weight: bold; }
        .item-desc { font-size: 7pt; font-weight: normal; text-transform: none; text-overflow: ellipsis; overflow: hidden; color: #333; }
        .sku-label { font-size: 8pt; font-weight: normal; }

        .separator {
            border-top: 1.5pt solid black;
            margin: 2px 0;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <button class="btn btn-print" onclick="window.print()">Print Labels</button>
        <a id="amazonBtn" class="btn btn-amazon" target="_blank">View Amazon Order</a>
    </div>

    <div id="labels-container"></div>

    <script>
        window.onload = function() {
            try {
                const params = new URLSearchParams(window.location.search);
                
                // Extract Data
                const orderId = params.get('order_id') || '';
                const skus = (params.get('sku') || '').split(',').filter(x => x);
                const codes = (params.get('code') || '').split(',').filter(x => x);
                const descs = (params.get('desc') || '').split('|').filter(x => x);
                const qtys = (params.get('qty') || '').split(',').filter(x => x);
                const brand = params.get('brand') || 'NEXT AI';
                const pkg = params.get('pkg') || '?';

                // Setup Amazon Shortcut
                const amzLink = document.getElementById('amazonBtn');
                if (orderId) {
                    amzLink.href = `https://sellercentral.amazon.com/orders-v3/order/${orderId}`;
                } else {
                    amzLink.style.display = 'none';
                }

                // Organize Rows
                let dataRows = [];
                skus.forEach(s => dataRows.push({ type: 'sku', text: s }));
                dataRows.push({ type: 'sep' });
                codes.forEach((c, i) => {
                    dataRows.push({ type: 'item', code: c, qty: qtys[i] || 0, desc: descs[i] || '' });
                });

                // Generate Pages (Max 5 lines per 1" height)
                const ROWS_LIMIT = 5;
                const container = document.getElementById('labels-container');
                
                for (let i = 0; i < dataRows.length; i += ROWS_LIMIT) {
                    const currentSet = dataRows.slice(i, i + ROWS_LIMIT);
                    const page = document.createElement('div');
                    page.className = 'label-page';

                    // Header: Only on the very first sticker
                    if (i === 0) {
                        page.innerHTML = `
                            <div class="header-section">
                                <span class="brand-text">${brand}</span>
                                <span class="pkg-badge">PKG: ${pkg}</span>
                            </div>`;
                    }

                    currentSet.forEach(row => {
                        const el = document.createElement('div');
                        if (row.type === 'sku') {
                            el.className = 'line-item';
                            el.innerHTML = `<span class="bullet">•</span><span class="sku-label">${row.text}</span>`;
                        } else if (row.type === 'item') {
                            el.className = 'line-item';
                            el.innerHTML = `
                                <div class="qty-frame">${row.qty}</div>
                                <div class="text-content">
                                    <span class="item-code">${row.code}</span>
                                    <span class="item-desc">${row.desc}</span>
                                </div>`;
                        } else if (row.type === 'sep') {
                            el.className = 'separator';
                        }
                        page.appendChild(el);
                    });
                    container.appendChild(page);
                }

                // Auto-trigger print
                setTimeout(() => { window.print(); }, 800);
                
            } catch (e) { console.error("Script Error:", e); }
        };
    </script>
</body>
</html>
